<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비즈니스 라이트 Greeting 훈련</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-badge">JJEMS</div>
      <h1 class="header-title">비즈니스 라이트 Greeting 훈련</h1>
      <p class="header-desc">객실사무장으로서 탑승한 JJEMS 승객에게<br>자연스럽고 차별화된 인사를 연습해보세요.</p>
    </header>

    <main class="main">
      <section class="select-section card">
        <label for="passengerSelect" class="section-label">탑승한 JJEMS 선택</label>
        <div class="select-wrapper">
          <select id="passengerSelect">
            <option value="">-- 탑승 승객을 선택하세요 --</option>
            <option value="1">VIP · 이재명 대통령</option>
            <option value="2">VVIP · 삼성 계열사 부회장</option>
            <option value="3">VIP · 주한 미국 대사</option>
            <option value="4">JJEMS Gold · 월 4회 이상 탑승 상용고객</option>
            <option value="5">VIP · 국가대표 축구선수단</option>
            <option value="6">JJEMS Silver · 첫 비즈니스 라이트 업그레이드 고객</option>
            <option value="7">VVIP · 유명 방송인 (방송 중 언급 가능)</option>
            <option value="8">JJEMS Gold · 고령 단골 어르신</option>
          </select>
        </div>
      </section>

      <section id="passengerSection" class="passenger-section hidden">
        <div class="profile-card card">
          <div class="profile-top">
            <div id="gradeTag" class="grade-tag"></div>
            <div class="profile-avatar" id="profileAvatar"></div>
          </div>
          <div class="profile-info">
            <p id="passengerName" class="passenger-name"></p>
            <p id="passengerSub" class="passenger-sub"></p>
          </div>
          <div class="profile-details" id="profileDetails"></div>
        </div>

        <div class="situation-card card">
          <div class="situation-badge">탑승 상황</div>
          <p id="situationText" class="situation-text"></p>
          <div class="hint-box">
            <span class="hint-label">✨ Greeting 포인트</span>
            <ul id="hintList" class="hint-list"></ul>
          </div>
        </div>
      </section>

      <section id="actionSection" class="action-section hidden">
        <div class="status-bar">
          <span class="status-label">훈련 상태</span>
          <span id="statusBadge" class="status-badge waiting">대기 중</span>
        </div>

        <div class="recording-area card">
          <p class="recording-guide">마이크 버튼을 눌러 Greeting을 녹음하세요</p>
          <button id="recordBtn" class="btn btn-record">
            <span class="btn-icon">🎤</span>
            <span id="recordBtnText">Greeting 녹음하기</span>
          </button>
          <div id="recordingIndicator" class="recording-indicator hidden">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="recording-text">녹음 중...</span>
          </div>
        </div>

        <div id="resultArea" class="result-area card hidden">
          <div class="result-header">
            <span class="result-icon">📋</span>
            <span class="result-title">Greeting 평가 결과</span>
          </div>
          <div id="resultContent" class="result-content"></div>
          <div id="exampleGreeting" class="example-greeting"></div>
        </div>

        <div class="action-buttons">
          <button id="submitBtn" class="btn btn-submit" disabled>
            <span class="btn-icon">📤</span>
            Greeting 완료
          </button>
          <button id="resetBtn" class="btn btn-reset">
            <span class="btn-icon">🔄</span>
            다른 승객으로 다시 시작
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>제주항공 객실사무장 · JJEMS 비즈니스 라이트 Greeting 훈련 시스템</p>
    </footer>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
